<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Equation Solver Workbench</title>
<style>
html, body { margin: 0; padding: 0; }
body {
  font-family: system-ui, -apple-system, sans-serif;
  color: #1e293b;
  line-height: 1.6;
  padding: 12px;
}
* { box-sizing: border-box; }
@media (prefers-color-scheme: dark) {
  body { color: #e2e8f0; background: #1e1e1e; }
}

*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f8fafc;color:#1e293b;padding:16px}
@media(prefers-color-scheme:dark){body{background:#1e1e1e;color:#e2e8f0}}
.lms-widget-title{font-size:1.05rem;font-weight:700;color:#4f46e5;margin-bottom:8px}
.lms-row{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin:10px 0}
.lms-row label{font-size:0.85rem;font-weight:600;color:#475569;min-width:60px}
.lms-row input[type=range]{flex:1;min-width:140px;accent-color:#6366f1}
.lms-val{display:inline-block;min-width:42px;text-align:center;font-weight:700;color:#6366f1;font-size:0.95rem;background:#eef2ff;border-radius:6px;padding:3px 10px}
.lms-display{text-align:center;font-size:1.35rem;font-weight:700;padding:14px;background:white;border-radius:12px;border:1px solid #e2e8f0;margin:10px 0}
.lms-info{background:#eef2ff;border:1px solid #c7d2fe;border-radius:10px;padding:12px 16px;margin:12px 0;font-size:0.9rem;line-height:1.55;color:#312e81}
.lms-info b{color:#4338ca}
.lms-btn{background:#6366f1;color:white;border:none;border-radius:8px;padding:8px 16px;font-size:0.85rem;font-weight:600;cursor:pointer;transition:background .15s}
.lms-btn:hover{background:#4f46e5}
.lms-btn.ghost{background:transparent;color:#6366f1;border:1px solid #c7d2fe}
.lms-btn.ghost:hover{background:#eef2ff}
canvas{display:block;max-width:100%;background:white;border-radius:10px;border:1px solid #e2e8f0}
@media(prefers-color-scheme:dark){
  .lms-display,canvas{background:#0f172a;border-color:#334155;color:#e2e8f0}
  .lms-val{background:#312e81;color:#c7d2fe}
  .lms-info{background:#1e1b4b;border-color:#3730a3;color:#c7d2fe}
  .lms-info b{color:#a5b4fc}
}

.eq-line{display:flex;align-items:center;justify-content:center;gap:14px;font-size:1.45rem;font-weight:700;font-family:ui-monospace,Menlo,monospace}
.eq-line .equals{color:#6366f1}
.beam-wrap{display:flex;justify-content:center;margin:14px 0 6px}
.steps{margin-top:10px;padding:10px 14px;background:white;border:1px dashed #c7d2fe;border-radius:10px;min-height:60px;font-size:0.85rem;font-family:ui-monospace,Menlo,monospace;color:#475569}
.steps .h-row{padding:3px 0;border-bottom:1px dotted #e2e8f0}
.steps .h-row:last-child{border-bottom:0}
@media(prefers-color-scheme:dark){.steps{background:#0f172a;color:#cbd5e1;border-color:#3730a3}}
.ops{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin:14px 0 8px}
.ops button{font-family:ui-monospace,Menlo,monospace;font-size:0.95rem}
.problem-picker{display:flex;gap:6px;justify-content:center;margin-bottom:10px;flex-wrap:wrap}
.problem-picker button{font-size:0.78rem;padding:5px 10px}
.problem-picker button.active{background:#4338ca}

</style>
</head>
<body>
<div class="lms-widget">
<div class="lms-widget-title">&#x1F3AE; Equation Solver Workbench</div>

<p style="font-size:0.88rem;color:#64748b;margin:6px 0 10px;text-align:center">
  Pick a problem. Click an operation to apply it to <em>both sides</em>. Buttons shown below match what this problem needs.
</p>
<div class="problem-picker">
  <button class="lms-btn ghost active" data-prob="0">3x + 7 = 22</button>
  <button class="lms-btn ghost" data-prob="1">5x − 4 = 16</button>
  <button class="lms-btn ghost" data-prob="2">2(x + 3) = 14</button>
  <button class="lms-btn ghost" data-prob="3">4x + 9 = 2x + 17</button>
</div>
<div class="eq-line"><span id="eqL">3x + 7</span><span class="equals">=</span><span id="eqR">22</span></div>
<div class="beam-wrap"><canvas id="beam" width="420" height="120"></canvas></div>
<div class="ops" id="ops"></div>
<div class="ops"><button class="lms-btn ghost" data-op="reset" id="resetBtn">reset</button></div>
<div class="lms-info" id="explain"><b>Goal:</b> Get x by itself on one side. Use inverse operations and apply each to BOTH sides.</div>
<div class="steps" id="steps"></div>

</div>
<script>
// Each problem is represented symbolically as { L:[a,b], R:[c,d] }
// where L = a*x + b and R = c*x + d. The display function rebuilds
// the human-readable string from these coefficients.
//
// Each problem also lists which buttons to show. This is intentional:
// students see only the operations relevant to the current problem,
// which acts as a hint AND prevents dead-ends.
var problems = [
  {
    start:{L:[3,7],R:[0,22]}, label:'3x + 7 = 22',
    ops:['-7','/3'],
  },
  {
    start:{L:[5,-4],R:[0,16]}, label:'5x − 4 = 16',
    ops:['+4','/5'],
  },
  {
    start:{L:[0,0],R:[0,14]}, raw:'2(x + 3) = 14', distOf:[2,6,0,14],
    label:'2(x + 3) = 14',
    ops:['distribute','-6','/2'],
  },
  {
    start:{L:[4,9],R:[2,17]}, label:'4x + 9 = 2x + 17',
    ops:['-2x','-9','/2'],
  },
];
var currentIdx = 0;
var state = JSON.parse(JSON.stringify(problems[0].start));
var distributed = false;
var steps = [];

function fmtSide(s){
  var a = s[0], b = s[1];
  if (a === 0 && b === 0) return '0';
  if (a === 0) return ''+b;
  var x = (a === 1 ? 'x' : (a === -1 ? '-x' : a+'x'));
  if (b === 0) return x;
  return x + (b > 0 ? ' + '+b : ' - '+(-b));
}

function update(){
  document.getElementById('eqL').textContent = fmtSide([state.L[0], state.L[1]]);
  document.getElementById('eqR').textContent = fmtSide([state.R[0], state.R[1]]);
  drawBeam();
  renderHistory();
}

function drawBeam(){
  var c = document.getElementById('beam');
  var ctx = c.getContext('2d');
  ctx.clearRect(0,0,c.width,c.height);
  var cx = c.width/2, cy = 70, len = 150;
  // Tilt is just for visual feedback when one side has more terms
  var leftMass = Math.abs(state.L[0]) + Math.abs(state.L[1])/4;
  var rightMass = Math.abs(state.R[0]) + Math.abs(state.R[1])/4;
  var tilt = Math.max(-0.18, Math.min(0.18, (leftMass - rightMass) * 0.04));
  // Fulcrum
  ctx.beginPath(); ctx.moveTo(cx, cy+22); ctx.lineTo(cx-16, cy+44); ctx.lineTo(cx+16, cy+44); ctx.closePath();
  ctx.fillStyle = '#94a3b8'; ctx.fill();
  // Beam (rotated)
  ctx.save();
  ctx.translate(cx, cy+22);
  ctx.rotate(tilt);
  ctx.beginPath(); ctx.moveTo(-len, 0); ctx.lineTo(len, 0);
  ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 5; ctx.lineCap = 'round'; ctx.stroke();
  // Left pan
  ctx.beginPath(); ctx.moveTo(-len, 0); ctx.lineTo(-len, -28);
  ctx.strokeStyle = '#a5b4fc'; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(-len, -32, 26, 9, 0, 0, Math.PI*2);
  ctx.fillStyle = '#c7d2fe'; ctx.fill(); ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#312e81'; ctx.font = 'bold 13px ui-monospace,monospace';
  ctx.textAlign = 'center'; ctx.fillText(fmtSide([state.L[0], state.L[1]]), -len, -28);
  // Right pan
  ctx.beginPath(); ctx.moveTo(len, 0); ctx.lineTo(len, -28);
  ctx.strokeStyle = '#a5b4fc'; ctx.lineWidth = 2; ctx.stroke();
  ctx.beginPath(); ctx.ellipse(len, -32, 26, 9, 0, 0, Math.PI*2);
  ctx.fillStyle = '#c7d2fe'; ctx.fill(); ctx.strokeStyle = '#6366f1'; ctx.lineWidth = 2; ctx.stroke();
  ctx.fillStyle = '#312e81'; ctx.fillText(fmtSide([state.R[0], state.R[1]]), len, -28);
  ctx.restore();
}

function renderHistory(){
  var el = document.getElementById('steps');
  if (steps.length === 0) {
    el.innerHTML = '<div style="color:#94a3b8">step history will appear here…</div>';
    return;
  }
  el.innerHTML = steps.map(function(h){ return '<div class="h-row">' + h + '</div>'; }).join('');
}

function applyOp(op){
  var explain = '';
  if (op === 'reset') {
    state = JSON.parse(JSON.stringify(problems[currentIdx].start));
    distributed = false;
    steps = [];
    explain = '<b>Reset.</b> Start over with the original equation.';
    if (problems[currentIdx].raw && !distributed) {
      // Show the raw form back
      document.getElementById('eqL').textContent = problems[currentIdx].raw.split('=')[0].trim();
      document.getElementById('eqR').textContent = problems[currentIdx].raw.split('=')[1].trim();
      document.getElementById('explain').innerHTML = explain;
      drawBeam();
      renderHistory();
      return;
    }
  } else if (op === 'distribute') {
    var d = problems[currentIdx].distOf;
    if (d && !distributed) {
      state = {L:[d[0], d[1]], R:[d[2], d[3]]};
      distributed = true;
      explain = '<b>Distribute:</b> 2(x + 3) becomes 2x + 6. Now we have a standard linear equation.';
      steps.push('distribute → ' + fmtSide(state.L) + ' = ' + fmtSide(state.R));
    } else if (d && distributed) {
      explain = '<b>Already distributed.</b>';
    } else {
      explain = '<b>Nothing to distribute</b> in this problem.';
    }
  } else if (op === '-2x') {
    state.L[0] -= 2; state.R[0] -= 2;
    explain = '<b>Subtract 2x</b> from both sides to gather variable terms on the left.';
    steps.push('−2x both sides → ' + fmtSide(state.L) + ' = ' + fmtSide(state.R));
  } else if (op[0] === '+') {
    var nA = parseInt(op.slice(1), 10);
    state.L[1] += nA; state.R[1] += nA;
    explain = '<b>Add ' + nA + '</b> to both sides to undo the constant.';
    steps.push('+' + nA + ' both sides → ' + fmtSide(state.L) + ' = ' + fmtSide(state.R));
  } else if (op[0] === '-') {
    var n = parseInt(op.slice(1), 10);
    state.L[1] -= n; state.R[1] -= n;
    explain = '<b>Subtract ' + n + '</b> from both sides to undo the constant.';
    steps.push('−' + n + ' both sides → ' + fmtSide(state.L) + ' = ' + fmtSide(state.R));
  } else if (op[0] === '/') {
    var d2 = parseInt(op.slice(1), 10);
    var canDivide =
      state.L[1] === 0 &&     // no constant on left
      state.R[0] === 0 &&     // no x on right
      state.L[0] % d2 === 0 && // coefficient divisible
      state.R[1] % d2 === 0;   // constant divisible
    if (canDivide) {
      state.L[0] /= d2;
      state.R[1] /= d2;
      explain = '<b>Divide by ' + d2 + ':</b> isolate x by undoing multiplication.';
      steps.push('÷' + d2 + ' both sides → ' + fmtSide(state.L) + ' = ' + fmtSide(state.R));
      if (state.L[0] === 1 && state.L[1] === 0 && state.R[0] === 0) {
        explain = '<b>&#x2705; Solved! x = ' + state.R[1] + '</b>';
      }
    } else if (state.L[1] !== 0) {
      explain = '<b>Hold on.</b> Move the constant on the left over first (it should be on the right by itself).';
    } else if (state.R[0] !== 0) {
      explain = '<b>Hold on.</b> Move the variable terms on the right over first.';
    } else {
      explain = '<b>That division won\'t give whole numbers.</b> Make sure both sides are divisible by ' + d2 + '.';
    }
  }
  document.getElementById('explain').innerHTML = explain;
  update();
}

function opLabel(op){
  if (op === 'reset') return 'reset';
  if (op === 'distribute') return 'distribute';
  if (op === '-2x') return '−2x';
  if (op[0] === '+') return '+' + op.slice(1);
  if (op[0] === '-') return '−' + op.slice(1);
  if (op[0] === '/') return '÷' + op.slice(1);
  return op;
}

function renderOps(){
  var container = document.getElementById('ops');
  container.innerHTML = '';
  problems[currentIdx].ops.forEach(function(op){
    var b = document.createElement('button');
    b.className = 'lms-btn';
    b.dataset.op = op;
    b.textContent = opLabel(op);
    b.addEventListener('click', function(){ applyOp(op); });
    container.appendChild(b);
  });
}

document.querySelectorAll('.problem-picker button').forEach(function(b){
  b.addEventListener('click', function(){
    document.querySelectorAll('.problem-picker button').forEach(function(x){ x.classList.remove('active'); });
    b.classList.add('active');
    currentIdx = +b.dataset.prob;
    state = JSON.parse(JSON.stringify(problems[currentIdx].start));
    distributed = false;
    steps = [];
    renderOps();
    if (problems[currentIdx].raw) {
      document.getElementById('eqL').textContent = problems[currentIdx].raw.split('=')[0].trim();
      document.getElementById('eqR').textContent = problems[currentIdx].raw.split('=')[1].trim();
      document.getElementById('explain').innerHTML = '<b>Hint:</b> Start by distributing 2 across the parentheses.';
      drawBeam();
      renderHistory();
    } else {
      document.getElementById('explain').innerHTML = '<b>Goal:</b> Get x by itself on one side.';
      update();
    }
  });
});

document.getElementById('resetBtn').addEventListener('click', function(){ applyOp('reset'); });

renderOps();
update();
</script>
</body>
</html>
