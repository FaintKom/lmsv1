services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lms_dev_password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://lms:lms_dev_password@db:5432/lms
      SANDBOX_URL: http://sandbox:8001
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend-net
      - frontend-net

  frontend:
    build: ./frontend
    command: npm run dev
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - backend
    networks:
      - frontend-net

  sandbox:
    build: ./sandbox
    command: uvicorn runner.main:app --host 0.0.0.0 --port 8001
    networks:
      - backend-net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
    read_only: true
    tmpfs:
      - /tmp:size=100M

volumes:
  pgdata:

networks:
  backend-net:
  frontend-net:
