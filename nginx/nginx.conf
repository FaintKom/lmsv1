## LearnHub LMS — Nginx Reverse Proxy (production)
## Used by docker-compose.prod.yml. Keep in sync with deploy/nginx.conf.

map $http_x_forwarded_proto $real_scheme {
    default $scheme;
    https   https;
}

server {
    listen 80;
    server_name _;

    # Docker internal DNS — resolves container names dynamically
    resolver 127.0.0.11 valid=10s;
    set $backend_upstream http://backend:8000;
    set $frontend_upstream http://frontend:3000;

    client_max_body_size 50M;

    ## --- Security headers (applied to all responses) ---
    ## Verify on deploy: https://securityheaders.com

    # Force HTTPS for 6 months. Start without `preload` — add after confirming.
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    # Clickjacking protection
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME sniffing
    add_header X-Content-Type-Options "nosniff" always;

    # Privacy: strip referrer on cross-origin
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable unused browser features
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # CSP: permissive enough for Next.js + Stripe + Monaco + Jitsi + video embeds.
    # Tighten in a P1 pass once all third-party origins are audited.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://meet.jit.si; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.stripe.com https://*.stripe.com wss: https:; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://www.youtube.com https://player.vimeo.com https://meet.jit.si; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    # Legacy — still respected by older browsers
    add_header X-XSS-Protection "1; mode=block" always;

    ## --- Upstreams ---

    # Backend API
    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_read_timeout 120s;
    }

    # Health check
    location /health {
        proxy_pass $backend_upstream;
    }

    # Swagger docs (dev only)
    location /docs {
        proxy_pass $backend_upstream;
    }

    location /openapi.json {
        proxy_pass $backend_upstream;
    }

    location /redoc {
        proxy_pass $backend_upstream;
    }

    # Frontend (everything else)
    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $real_scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
