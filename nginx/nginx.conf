## GrassLMS — Nginx Reverse Proxy (production)
## Domain: grasslms.online

map $http_x_forwarded_proto $real_scheme {
    default $scheme;
    https   https;
}

# ---------- Shared upstream variables ----------
# Docker internal DNS — resolves container names dynamically.
# These must be set in every server block that uses proxy_pass.

# ---------- HTTP → HTTPS redirect ----------
server {
    listen 80;
    server_name grasslms.online www.grasslms.online;

    # Let's Encrypt ACME challenge (certbot webroot)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://grasslms.online$request_uri;
    }
}

# ---------- Main HTTPS server ----------
server {
    listen 443 ssl;
    http2 on;
    server_name grasslms.online www.grasslms.online;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Redirect www → bare domain
    if ($host = www.grasslms.online) {
        return 301 https://grasslms.online$request_uri;
    }

    resolver 127.0.0.11 valid=10s;
    set $backend_upstream http://backend:8000;
    set $frontend_upstream http://frontend:3000;

    client_max_body_size 50M;

    ## --- Security headers ---
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://meet.jit.si https://cdn.jsdelivr.net https://unpkg.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.jsdelivr.net; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com https://cdn.jsdelivr.net; connect-src 'self' https://api.stripe.com https://*.stripe.com https://cdn.jsdelivr.net wss: https:; frame-src 'self' blob: data: https://js.stripe.com https://hooks.stripe.com https://www.youtube.com https://player.vimeo.com https://meet.jit.si https://www.desmos.com https://desmos.com; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;
    add_header X-XSS-Protection "1; mode=block" always;

    ## --- Upstreams ---

    location /api/ {
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass $backend_upstream;
    }

    location /docs {
        proxy_pass $backend_upstream;
    }

    location /openapi.json {
        proxy_pass $backend_upstream;
    }

    location /redoc {
        proxy_pass $backend_upstream;
    }

    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}

# ---------- Redirect old nip.io → new domain ----------
server {
    listen 80 default_server;
    listen 443 ssl default_server;
    server_name _;

    ssl_certificate /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Health check must stay accessible on any hostname (Docker orchestrator)
    resolver 127.0.0.11 valid=10s;
    set $backend_upstream http://backend:8000;

    location /health {
        proxy_pass $backend_upstream;
    }

    # Everything else → redirect to the real domain
    location / {
        return 301 https://grasslms.online$request_uri;
    }
}
