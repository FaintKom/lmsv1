## GrassLMS — Staging Nginx server blocks.
## Domain: staging.grasslms.online
##
## Loaded by the prod nginx container alongside default.conf
## (mount as /etc/nginx/conf.d/staging.conf:ro). The prod nginx is on
## the `lms_internal` Docker network; staging containers attach to the
## same network so we can resolve them by name:
##   lms-staging-backend-1:8000
##   lms-staging-frontend-1:3000

# ---------- HTTP → HTTPS redirect ----------
server {
    listen 80;
    server_name staging.grasslms.online;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        allow all;
    }

    location / {
        return 301 https://staging.grasslms.online$request_uri;
    }
}

# ---------- Staging HTTPS server ----------
server {
    listen 443 ssl;
    http2 on;
    server_name staging.grasslms.online;

    ssl_certificate /etc/nginx/ssl/staging.cert.pem;
    ssl_certificate_key /etc/nginx/ssl/staging.key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    resolver 127.0.0.11 valid=10s;
    set $staging_backend  http://lms-staging-backend-1:8000;
    set $staging_frontend http://lms-staging-frontend-1:3000;

    client_max_body_size 50M;

    add_header X-Environment "staging" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header X-XSS-Protection "1; mode=block" always;

    location /api/ {
        proxy_pass $staging_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 120s;
    }

    location /health {
        proxy_pass $staging_backend;
    }

    location /docs {
        proxy_pass $staging_backend;
    }

    location /openapi.json {
        proxy_pass $staging_backend;
    }

    location /redoc {
        proxy_pass $staging_backend;
    }

    location / {
        proxy_pass $staging_frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
        add_header Content-Type text/plain;
    }
}
