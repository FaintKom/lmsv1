name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs when a new commit is pushed to the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (lint + test)
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector/pgvector:pg16 = postgres:16 + vector extension. Drop-in
        # replacement so the knowledge module's CREATE TABLE ... VECTOR(...)
        # works in CI (matches prod's pgvector/pgvector:pg16 image).
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: lms
          POSTGRES_PASSWORD: lms_ci_password
          POSTGRES_DB: lms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U lms -d lms_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    env:
      # The test suite uses settings.get_database_url(), so feed it async URL.
      ASYNC_DATABASE_URL: postgresql+asyncpg://lms:lms_ci_password@localhost:5432/lms_test
      DATABASE_URL: postgresql+asyncpg://lms:lms_ci_password@localhost:5432/lms_test
      JWT_SECRET: ci-test-secret-at-least-32-characters-long-for-validation
      ENVIRONMENT: development
      DEBUG: "true"
      EMAIL_ENABLED: "false"
      STRIPE_SECRET_KEY: ""
      STRIPE_WEBHOOK_SECRET: ""
      SENTRY_DSN: ""

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff lint
        run: ruff check app/ tests/

      - name: Pytest
        run: pytest -q --maxfail=5

  frontend:
    name: Frontend (lint + typecheck + build)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    env:
      # Build-time env so Next.js does not error on missing variables.
      # BACKEND_URL is used in next.config.ts rewrites; point it at a
      # placeholder that will never be called during build.
      BACKEND_URL: http://localhost:8000

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      # ESLint is non-blocking until a dedicated cleanup pass — there are
      # ~145 existing-code problems (React compiler hints, legacy `any`
      # types, set-state-in-effect) that predate this CI setup. New errors
      # still show up in the job log; they just don't gate merges until
      # the baseline is cleaned up. Tracked as a P1 follow-up.
      - name: ESLint (non-blocking)
        continue-on-error: true
        run: npm run lint

      # TypeScript check is a hard gate — clean on current main.
      - name: TypeScript check
        run: npx tsc --noEmit

      # Vitest unit tests (translations parity, utils, components).
      - name: Vitest
        run: npm test

      # Next.js build is the ultimate "does it compile" check.
      - name: Next.js build
        run: npm run build
