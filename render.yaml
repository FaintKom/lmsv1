databases:
  - name: lms-db
    plan: free
    databaseName: lms
    user: lms

services:
  - type: web
    name: lms-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
        # Render gives psycopg2 URL; we need asyncpg
      - key: ASYNC_DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        value: https://lms-frontend-uy53.onrender.com
      - key: DEBUG
        value: "true"
      - key: APP_NAME
        value: LearnHub
      - key: SANDBOX_URL
        value: ""
      - key: UPLOAD_DIR
        value: /data/uploads
    healthCheckPath: /health

  - type: web
    name: lms-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: BACKEND_URL
        value: https://lms-backend-0b8v.onrender.com
