databases:
  - name: lms-db
    plan: basic-256mb
    databaseName: lms
    user: lms

services:
  - type: web
    name: lms-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
        # Render gives psycopg2 URL; we need asyncpg
      - key: ASYNC_DATABASE_URL
        fromDatabase:
          name: lms-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: CORS_ORIGINS
        value: https://lms-frontend-uy53.onrender.com
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: APP_NAME
        value: LearnHub
      - key: SANDBOX_URL
        value: ""
      - key: UPLOAD_DIR
        value: /data/uploads
      # Super admin bootstrap — set via Render dashboard, not in code.
      # If either is empty, no super admin is created on startup; existing
      # admins in the database are untouched. Rotate passwords via the app.
      - key: SUPER_ADMIN_EMAIL
        sync: false
      - key: SUPER_ADMIN_PASSWORD
        sync: false
      # Rate limit storage — default memory:// works for single-worker only.
      # Switch to redis://... once Redis is part of the stack.
      - key: RATE_LIMIT_STORAGE_URI
        value: "memory://"
    healthCheckPath: /health

  - type: web
    name: lms-frontend
    runtime: docker
    dockerfilePath: ./frontend/Dockerfile
    dockerContext: ./frontend
    plan: free
    envVars:
      - key: BACKEND_URL
        value: https://lms-backend-0b8v.onrender.com
