## LearnHub LMS — Production Docker Compose for Hetzner VPS
## Optimized for CX22 (2 vCPU, 4GB RAM)

services:
  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5432:5432"  # Only localhost, not public
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    restart: always
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2
    ports:
      - "127.0.0.1:8000:8000"  # Only localhost, nginx proxies
    environment:
      DATABASE_URL: postgresql+asyncpg://lms:${POSTGRES_PASSWORD}@db:5432/lms
      JWT_SECRET: ${JWT_SECRET}
      JWT_ALGORITHM: HS256
      JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
      JWT_REFRESH_TOKEN_EXPIRE_DAYS: 7
      CORS_ORIGINS: ${CORS_ORIGINS}
      SANDBOX_URL: ""
      APP_NAME: LearnHub
      DEBUG: "false"
      UPLOAD_DIR: /data/uploads
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:8000
    restart: always
    ports:
      - "127.0.0.1:3000:3000"  # Only localhost, nginx proxies
    environment:
      BACKEND_URL: http://backend:8000

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro  # SSL certs from Coolify/certbot
    depends_on:
      - backend
      - frontend

volumes:
  pgdata:
  uploads:
