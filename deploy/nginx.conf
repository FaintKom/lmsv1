## LearnHub LMS — Nginx Reverse Proxy
## Routes /api/* to backend, everything else to frontend.
##
## Security headers are applied at the server level with `always` so they
## appear on both success and error responses. Verify on deploy with:
##   https://securityheaders.com
##
## CSP note: the policy below permits what Next.js + Monaco editor + Stripe.js
## actually need. Tighten further in a P1 pass once all third-party script
## origins are audited.

server {
    listen 80;
    server_name _;

    # Docker internal DNS — resolves container names dynamically
    resolver 127.0.0.11 valid=10s;

    client_max_body_size 50M;

    ## --- Security headers (applied to all responses) ---

    # Strict-Transport-Security: force HTTPS for 6 months. Add `preload` only
    # after confirming all subdomains serve HTTPS and you're ready to submit
    # to https://hstspreload.org.
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;

    # Clickjacking protection — allow framing only from same origin.
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME-type sniffing — force browsers to honour declared Content-Type.
    add_header X-Content-Type-Options "nosniff" always;

    # Send no referrer to cross-origin destinations — protects learner privacy.
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Disable browser features not used by the LMS.
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    # Content Security Policy — permissive enough for Next.js, Stripe, Monaco,
    # YouTube/Vimeo video embeds, and Jitsi meetings. Tighten in P1 pass.
    # - 'unsafe-inline' and 'unsafe-eval' in script-src are required by Next.js dev mode
    #   and Monaco editor's worker bootstrap; remove 'unsafe-eval' in production build.
    # - blob: and data: are needed for dynamic imports and image processing.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://meet.jit.si; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https://fonts.gstatic.com; connect-src 'self' https://api.stripe.com https://*.stripe.com wss: https:; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://www.youtube.com https://player.vimeo.com https://meet.jit.si; worker-src 'self' blob:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'self'" always;

    # Legacy header — still respected by some older browsers; harmless to include.
    add_header X-XSS-Protection "1; mode=block" always;

    ## --- Upstreams ---

    # Backend API
    location /api/ {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # Backend docs
    location ~ ^/(docs|redoc|openapi\.json) {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
        proxy_set_header Host $host;
    }

    # Health check
    location /health {
        set $backend_upstream http://backend:8000;
        proxy_pass $backend_upstream;
    }

    # Frontend (everything else)
    location / {
        set $frontend_upstream http://frontend:3000;
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
